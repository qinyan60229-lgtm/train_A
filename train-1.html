<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hero's Quest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="cotainer">
        <div class="row">
            <div class="col text-center box">
                <h2>Hero's Quest</h2>
            </div>
        </div>
        <div class="row">
            <div class="col-3 box">
                <h4>玩家資訊</h4>

                <p>👤 勇者</p>

                <p>Lv：1</p>

                <p>HP：100/100</p>

                <p>Gold：50</p>
            </div>
            <div class="col-6 map text-center">
                <p>🟩🟩🟩🟩🟩</p>
                <p>🟩😀⬜👾🟩</p>
                <p>🟩⬜⬜⬜🟩</p>
                <p>🟩💰❤️🏰🟩</p>
                <p>🟩🟩🟩🟩🟩</p>
            </div>
            <div class="col-3 box">
                <h4>任務</h4>
                <ul>
                    <li>擊敗史萊姆</li>
                    <li>找到出口</li>
                </ul>
            </div>
        </div>
        <div class="row">
            <div class="col">
                📜 訊息：你進入了森林...
            </div>
        </div>
        <div class="row">
            <div class="col text-center box">
                <button class="btn btn-primary">⬆</button>
            <button class="btn btn-primary">⬅</button>
            <button class="btn btn-primary">➡</button>
            <button class="btn btn-primary">⬇</button>
            <button class="btn btn-danger">⚔ 攻擊</button>
            </div>
        </div>
    </div>




</body>

</html>
