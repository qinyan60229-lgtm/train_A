<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>Hero's Quest</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../train2-css.css">
</head>

<body>

    <header class="game-title">
        ⚔️ HERO'S QUEST ⚔️
    </header>

    <main class="container-fluid">

        <div class="row game-area">

            <!-- 玩家資訊 -->
            <div class="col-md-3">
                <div class="panel">

                    <h3>😀 勇者資訊</h3>
                    <hr>

                    <p>⭐ Level：
                        <span id="level">1</span>
                    </p>

                    <p>❤️ HP</p>
                    <div class="status-bar">
                        <div id="playerHPBar"></div>
                    </div>

                    <p id="playerHP">100 / 100</p>

                    <p>✨ EXP</p>
                    <div class="status-bar exp-bar">
                        <div id="expBar"></div>
                    </div>

                    <p>
                        <span id="exp">0</span> /
                        <span id="needExp">20</span>
                    </p>

                    <p>💰 Gold：
                        <span id="gold">0</span>
                    </p>

                    <hr>

                    <p>
                        🧪 治療藥水：
                        <span id="potion">
                            3
                        </span>
                        瓶
                    </p>


                    <button class="btn btn-success" onclick="usePotion()">

                        🧪 使用藥水

                    </button>

                </div>
            </div>


            <!-- 地圖 -->
            <div class="col-md-6">
                <div class="panel">

                    <h3>🗺️ 探索區域</h3>

                    <div id="map"></div>

                </div>
            </div>


            <!-- 任務與背包 -->
            <div class="col-md-3">
                <div class="panel">

                    <h3>📜 任務目標</h3>

                    <hr>

                    <p>目前任務：</p>

                    <p id="quest">
                        探索未知迷宮
                    </p>

                    <hr>

                    <h3>🎒 背包</h3>

                    <ul>
                        <li>🗡 木劍</li>
                        <li>🧪 治療藥水</li>
                        <li>💎 神秘寶石</li>
                    </ul>

                </div>
            </div>

        </div>


        <!-- 戰鬥區 -->

        <div class="row">

            <div class="col-12">

                <div id="battlePanel" class="panel">

                    <h3>⚔️ 戰鬥資訊</h3>

                    <hr>

                    <h4 id="monsterName">
                        沒有敵人
                    </h4>


                    <div class="status-bar monster-bar">
                        <div id="monsterHPBar"></div>
                    </div>


                    <p id="monsterHp">
                        HP：--
                    </p>


                    <hr>


                    <button id="attackBtn" onclick="attack()" class="=btn btn-danger">
                        ⚔️ 攻擊
                    </button>

                    <button class="btn btn-primary">
                        ✨ 技能
                    </button>

                    <button onclick="defend()" class="btn btn-secondary">
                        🛡 防禦
                    </button>

                    <button class="btn btn-success">
                        🎒 背包
                    </button>

                    <button onclick="runAway()" class="btn btn-warning">
                        🏃逃跑
                    </button>


                    <hr>


                    <div id="battleLog">
                        等待戰鬥...
                    </div>

                </div>

            </div>

        </div>

    </main>


    <!-- 訊息提示 -->
    <div id="messageBox"></div>


    <!-- GAME OVER -->
    <div id="gameOver" class="text-center">

        <h1>
            💀 GAME OVER 💀
        </h1>

        <button onclick="resetGame()">
            重新開始
        </button>

    </div>


    <script src="../train2-js.js"></script>

</body>

</html>
